name: Build Arch Linux XFCE ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Arch Linux XFCE ISO
        run: |
          # Cria um Dockerfile para construir a imagem com as ferramentas necessárias
          echo '
          FROM archlinux/archlinux:latest

          RUN pacman -Syu --noconfirm && \
              pacman -S --noconfirm base-devel git archiso && \
              git clone https://gitlab.archlinux.org/archlinux/archiso /archiso

          WORKDIR /archiso
          COPY ./releng /workspace/releng
          WORKDIR /workspace/releng

          CMD ["buildiso", "-v"]
          ' > Dockerfile

          # Constrói a imagem Docker
          docker build -t archlinux-xfce-builder .

          # Executa o container para construir a ISO
          docker run --rm -v ${{ github.workspace }}:/workspace archlinux-xfce-builder

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v3
        with:
          name: archlinux-xfce-iso
          path: /workspace/releng/*.iso
