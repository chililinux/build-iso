name: Build Manjaro XFCE ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Manjaro XFCE ISO
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace talesam/community-build:1.3 /bin/bash -c "
            # Atualize o sistema e instale as ferramentas necessárias
            pacman -Syu --noconfirm
            pacman -S --noconfirm base-devel git manjaro-tools manjaro-tools-iso

            # Verifique onde os perfis estão localizados
            echo 'Verificando diretórios...'
            find / -name 'iso-profiles'

            # Navegue até o diretório de perfis (ajuste conforme necessário)
            PROFILE_DIR=\$(find / -name 'iso-profiles' | head -n 1)
            if [ -z \"\$PROFILE_DIR\" ]; then
              echo 'Diretório de perfis não encontrado!'
              exit 1
            fi
            echo 'Diretório de perfis encontrado em: \$PROFILE_DIR'

            # Verifique os perfis disponíveis
            ls -l \$PROFILE_DIR

            # Execute a ferramenta buildiso com o perfil xfce
            # Ajuste o caminho conforme necessário
            buildiso -v -c /workspace/xfce
          "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v3
        with:
          name: manjaro-xfce-iso
          path: /workspace/*.iso
