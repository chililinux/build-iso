name: Build Manjaro XFCE ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Display Hello World
        run: echo "Hello, World!"

      - name: Build Manjaro XFCE ISO
        uses: docker://talesam/community-build:1.3
        with:
          entrypoint: /bin/bash
        run: |
          echo "Building Manjaro XFCE ISO"
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git manjaro-tools

          # Clone the release-tools repo
          git clone https://gitlab.manjaro.org/manjaro/release-tools /release-tools

          # Check if the releng directory is present and copy it
          mkdir -p /workspace/releng
          cp -r ./releng /workspace/releng

          # Navigate to the releng directory and build the ISO
          cd /workspace/releng
          buildiso -v

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v3
        with:
          name: manjaro-xfce-iso
          path: /workspace/releng/*.iso
