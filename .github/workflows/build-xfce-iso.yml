name: Build Manjaro XFCE ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Docker Container
        uses: docker://talesam/community-build:1.3
        with:
          args: /bin/bash -c "
            # Atualize o sistema e instale as ferramentas necessárias
            pacman -Syu --noconfirm
            pacman -S --noconfirm base-devel git manjaro-tools manjaro-tools-iso

            # Clone o repositório iso-profiles
            git clone https://github.com/chililinux/iso-profiles.git /workspace/iso-profiles

            # Navegue até o diretório de perfis
            cd /workspace/iso-profiles

            # Verifique os perfis disponíveis
            ls -l

            # Configure o buildiso para usar o perfil xfce
            buildiso -v -c /workspace/xfce
          "

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v3
        with:
          name: manjaro-xfce-iso
          path: /workspace/*.iso
