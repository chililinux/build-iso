name: Build Manjaro XFCE ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Manjaro XFCE ISO
        uses: docker://talesam/community-build:1.3
        with:
          entrypoint: /bin/bash
        run: |
          # Atualize o sistema e instale as ferramentas necessárias
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git manjaro-tools

          # Clone o repositório de ferramentas
          git clone https://gitlab.manjaro.org/manjaro/release-tools /release-tools

          # Verifique se o diretório releng está presente e copie-o
          mkdir -p /workspace/releng
          cp -r ./releng /workspace/releng

          # Navegue até o diretório releng e construa a ISO
          cd /workspace/releng
          buildiso -v

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v3
        with:
          name: manjaro-xfce-iso
          path: /workspace/releng/*.iso
