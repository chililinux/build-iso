name: Build Manjaro XFCE ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Manjaro XFCE ISO
        run: |
          # Cria um Dockerfile para construir a imagem com as ferramentas necessárias
          echo '
          FROM manjaro/manjaro-base:latest

          RUN pacman -Syu --noconfirm && \
              pacman -S --noconfirm base-devel git manjaro-tools && \
              git clone https://gitlab.manjaro.org/manjaro/release-tools /release-tools

          WORKDIR /release-tools
          COPY ./releng /workspace/releng
          WORKDIR /workspace/releng

          CMD ["buildiso", "-v"]
          ' > Dockerfile

          # Constrói a imagem Docker
          docker build -t manjaro-xfce-builder .

          # Executa o container para construir a ISO
          docker run --rm -v ${{ github.workspace }}:/workspace manjaro-xfce-builder

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v3
        with:
          name: manjaro-xfce-iso
          path: /workspace/releng/*.iso
